[build]
  functions = "netlify/functions"
  publish = "."

[[redirects]]
  from = "/api/subscribe"
  to = "/.netlify/functions/subscribe"
  status = 200

[[redirects]]
  from = "/api/subscribe-meditation"
  to = "/.netlify/functions/subscribe-meditation"
  status = 200

# ─── CABECERAS DE SEGURIDAD ─────────────────────────────────────────────────
# Protección contra XSS, clickjacking, MIME sniffing y forzado de HTTPS.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https:; media-src https://drive.google.com https://*.dropbox.com; connect-src 'self' https://api.brevo.com https://www.googletagmanager.com https://www.google-analytics.com https://*.google-analytics.com https://*.analytics.google.com; frame-src https://calendly.com; form-action 'self'"

# La página principal nunca debe quedar cacheada de forma agresiva,
# para que cada actualización que subas se vea de inmediato.
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/meditacion.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
